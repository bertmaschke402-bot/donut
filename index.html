<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❄ DonutSMP Market Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0f1a;
    color:white;
    overflow-x:hidden;
    position:relative;
  }
  h1{text-align:center;padding:20px;}
  .container{width:95%;margin:auto;}
  .cards{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
    backdrop-filter:blur(10px);
    min-width:260px;
    text-align:center;
    box-shadow:0 0 15px rgba(255,255,255,0.05);
    transition: transform 0.3s;
  }
  .card:hover{transform: scale(1.05);}
  table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    overflow:hidden;
  }
  th,td{padding:10px;text-align:left;}
  th{background:rgba(255,255,255,0.1);}
  tr:nth-child(even){background:rgba(255,255,255,0.03);}
  .green{color:#00ffae;}
  .red{color:#ff4d4d;}
  button{
    background:#111827;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:15px;
    transition: background 0.3s;
  }
  button:hover{background:#1f2937;}
  canvas#dropChart{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    display:block;
    margin:auto;
    max-width:100%;
    margin-top:30px;
  }
  #backgroundCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    z-index:-1;
  }
  @media(max-width:600px){
    .cards{flex-direction:column;align-items:center;}
  }
</style>
</head>
<body>

<canvas id="backgroundCanvas"></canvas>

<h1>❄ DonutSMP Market Tracker</h1>

<div class="container">

  <div style="text-align:center;">
    <button onclick="resetData()">Reset Tagesdaten</button>
  </div>

  <div class="cards">
    <div class="card">
      <h3>🔥 Biggest Spike (10 → Now)</h3>
      <div id="spike">-</div>
    </div>
    <div class="card">
      <h3>📉 Biggest Crash (10 → Now)</h3>
      <div id="crash">-</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>High</th>
        <th>Low</th>
        <th>Now</th>
        <th>10→Now %</th>
        <th>20→Now %</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <canvas id="dropChart" height="200"></canvas>

</div>

<script>
const API="https://api.donut.auction/orders";
const STORAGE_KEY="donut_history_v2";

function loadHistory(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}
function saveHistory(data){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}
function resetData(){localStorage.removeItem(STORAGE_KEY); location.reload();}

async function fetchData(){
  try{
    const res=await fetch(API);
    const json=await res.json();
    const orders=json.orders||json||[];
    const hour=new Date().getHours();
    let history=loadHistory();

    orders.forEach(o=>{
      const item=o.item.itemId;
      const price=o.itemPrice;

      if(!history[item]){
        history[item]={high:price, low:price, at10:null, at20:null, now:price, history:[]};
      }

      if(price>history[item].high) history[item].high=price;
      if(price<history[item].low) history[item].low=price;

      if(hour===10 && !history[item].at10) history[item].at10=price;
      if(hour===20 && !history[item].at20) history[item].at20=price;

      history[item].now=price;
      history[item].history.push({time:Date.now(),price});
    });

    saveHistory(history);
    render(history);
    renderChart(history);
  }catch(e){console.log("API Error",e);}
}

function percentDiff(current,old){if(!old) return 0; return ((current-old)/old*100).toFixed(2);}
function render(history){
  const table=document.getElementById("tableBody");
  table.innerHTML="";
  let stats=[];

  for(const item in history){
    const h=history[item];
    const diff10=percentDiff(h.now,h.at10);
    const diff20=percentDiff(h.now,h.at20);
    stats.push({item,diff10:parseFloat(diff10),...h});
    table.innerHTML+=`
      <tr>
        <td>${item}</td>
        <td>${h.high}</td>
        <td>${h.low}</td>
        <td>${h.now}</td>
        <td class="${diff10>=0?'green':'red'}">${diff10}%</td>
        <td class="${diff20>=0?'green':'red'}">${diff20}%</td>
      </tr>`;
  }

  if(stats.length>0){
    const spike=[...stats].sort((a,b)=>b.diff10-a.diff10)[0];
    const crash=[...stats].sort((a,b)=>a.diff10-b.diff10)[0];
    document.getElementById("spike").innerHTML=spike?`${spike.item} (${spike.diff10}%)`:"-";
    document.getElementById("crash").innerHTML=crash?`${crash.item} (${crash.diff10}%)`:"-";
  }
}

// Chart für Biggest Crash
let dropChart;
function renderChart(history){
  let stats=Object.entries(history).map(([item,h])=>({item,...h,diff10:percentDiff(h.now,h.at10)}));
  stats.sort((a,b)=>a.diff10-b.diff10);
  let topDrops = stats.slice(0,5); // Top 5 Crash Items

  const datasets=topDrops.map(d=>{
    return {
      label:d.item,
      data:d.history.map(h=>({x:h.time,y:h.price})),
      borderColor:'hsl(' + Math.random()*360 + ', 100%, 60%)',
      fill:false,
      tension:0.3
    }
  });

  const ctx=document.getElementById('dropChart').getContext('2d');
  if(dropChart) dropChart.destroy();
  dropChart=new Chart(ctx,{
    type:'line',
    data:{datasets},
    options:{
      parsing:{xAxisKey:'x',yAxisKey:'y'},
      animation:false,
      scales:{
        x:{type:'time',time:{unit:'hour'}, ticks:{color:'white'}},
        y:{ticks:{color:'white'}}
      },
      plugins:{legend:{labels:{color:'white'}}}
    }
  });
}

fetchData();
setInterval(fetchData,600000);
setInterval(()=>{
  const now=new Date();
  if(now.getHours()===0 && now.getMinutes()===0) resetData();
},60000);

// Hintergrund Punkte (loop)
const canvas=document.getElementById('backgroundCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let points=[];
for(let i=0;i<200;i++){
  points.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2+1, speed:Math.random()*0.5+0.2});
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  points.forEach(p=>{
    p.y+=p.speed;
    if(p.y>canvas.height) p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='white';
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>

</body>
</html>
